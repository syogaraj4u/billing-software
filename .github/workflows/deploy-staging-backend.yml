name: Deploy staging Supabase

on:
  push:
    branches:
      - staging
    paths:
      - "supabase/**"
      - "supabase-schema.sql"
      - ".github/workflows/deploy-staging-backend.yml"
  workflow_dispatch:

concurrency:
  group: staging-supabase
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Apply schema and Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.STAGING_SUPABASE_PROJECT_ID }}
      STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate staging secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_ID"
          test -n "$STAGING_DATABASE_URL"

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply complete staging schema
        run: psql "$STAGING_DATABASE_URL" --set=ON_ERROR_STOP=1 --file=supabase-schema.sql

      - name: Deploy all staging Edge Functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
