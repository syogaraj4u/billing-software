name: Billing quality gate

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: billing-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Logic, build and browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Check JavaScript syntax
        run: npm run check

      - name: Run regression tests
        run: npm test

      - name: Build native web assets
        run: npm run mobile:build

      - name: Build production website
        run: npm run web:build

      - name: Run desktop and mobile browser tests
        run: npm run test:e2e

      - name: Upload browser failure report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
